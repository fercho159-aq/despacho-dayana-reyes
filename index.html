<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Sitio web en construcción | Dayana Reyes y Abogados</title>
  <meta name="description" content="Estamos construyendo nuestro nuevo sitio web. Muy pronto en línea. Despacho de abogados laborales para empresas en CDMX.">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#122036">

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231E3A5F'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='17' font-weight='700' text-anchor='middle' fill='%23E4CE9A'%3EDR%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --c-marino: #122036;
      --c-marino-dark: #0B1424;
      --c-azul: #1E3A5F;
      --c-oro: #C6A35C;
      --c-oro-claro: #E4CE9A;
      --font-titulo: 'Oswald', 'Arial Narrow', Impact, sans-serif;
      --font-cuerpo: 'Poppins', -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem;
      font-family: var(--font-cuerpo);
      color: rgba(255,255,255,0.85);
      text-align: center;
      background:
        radial-gradient(120% 120% at 85% 0%, rgba(30,58,95,0.65) 0%, transparent 55%),
        linear-gradient(160deg, var(--c-marino) 0%, var(--c-marino-dark) 60%, var(--c-azul) 140%);
      position: relative;
      overflow: hidden;
    }
    /* Textura decorativa de puntos */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(198,163,92,0.10) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.6;
      pointer-events: none;
    }

    .wrap {
      position: relative;
      max-width: 620px;
      width: 100%;
    }

    /* Logo / marca */
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 0.7rem;
      margin-bottom: 2.5rem;
    }
    .brand__logo {
      width: 130px; height: 130px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .brand__text { display: flex; flex-direction: column; line-height: 1.05; text-align: left; }
    .brand__name {
      font-family: var(--font-titulo);
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #fff;
    }
    .brand__tag {
      font-size: 0.66rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--c-oro-claro);
      font-weight: 600;
    }

    /* Insignia "en construcción" */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.5rem 1.1rem;
      border: 1px solid rgba(198,163,92,0.45);
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--c-oro-claro);
      margin-bottom: 1.75rem;
    }
    .badge svg { width: 16px; height: 16px; }

    /* Título principal */
    h1 {
      font-family: var(--font-titulo);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: clamp(2.1rem, 8vw, 4rem);
      color: #fff;
    }
    h1 span { display: block; color: var(--c-oro-claro); }

    .rule {
      width: 70px; height: 3px; border: 0;
      margin: 1.5rem auto;
      background: linear-gradient(90deg, var(--c-oro), var(--c-oro-claro));
      border-radius: 2px;
    }

    .lead {
      font-size: clamp(1rem, 2.4vw, 1.15rem);
      line-height: 1.7;
      color: rgba(255,255,255,0.78);
      max-width: 46ch;
      margin: 0 auto;
    }
    .spec {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      font-weight: 500;
    }

    /* Contacto discreto */
    .contact {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
    }
    .contact a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.3rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.2s ease, background 0.2s ease, border-color 0.2s ease;
    }
    .contact a svg { width: 17px; height: 17px; }
    .contact a:hover { transform: translateY(-2px); }
    .contact .wa {
      background: #25D366; color: #fff;
      box-shadow: 0 8px 20px rgba(37,211,102,0.35);
    }
    .contact .ghost {
      background: transparent;
      color: rgba(255,255,255,0.85);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .contact .ghost:hover { border-color: var(--c-oro-claro); color: var(--c-oro-claro); }

    @media (prefers-reduced-motion: reduce) {
      .contact a:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">
      <img class="brand__logo" src="assets/logo34.png" alt="Dayana Reyes y Abogados">
    </div>

    <p class="badge">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4l-6 6a2 2 0 1 0 3 3l6-6a4 4 0 0 0 5.4-5.4l-2.6 2.6-2.4-.6-.6-2.4 2.6-2.6z"/></svg>
      En construcción
    </p>

    <h1>Sitio web <span>en construcción</span></h1>
    <hr class="rule">
    <p class="lead">Estamos preparando una nueva experiencia digital a la altura de nuestro despacho. Muy pronto estaremos en línea.</p>
    <p class="spec">Especialistas en Derecho Laboral Empresarial · Ciudad de México</p>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Llamar
      </a>
      <a class="ghost" href="mailto:contacto@dayanareyesabogados.com">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 5L2 7"/></svg>
        Correo
      </a>
    </div>
  </main>
</body>
</html>
