<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Firma legal boutique">
  <defs>
    <linearGradient id="f-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EBD9A7"/>
      <stop offset="1" stop-color="#D9BE7E"/>
    </linearGradient>
    <linearGradient id="f-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C4A70"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Acento dorado -->
  <circle cx="150" cy="150" r="104" fill="url(#f-gold)" opacity="0.3"/>

  <!-- Rascacielos corporativos -->
  <g>
    <rect x="392" y="150" width="120" height="300" rx="6" fill="#1E3A5F"/>
    <rect x="470" y="210" width="96" height="240" rx="6" fill="#2C4A70"/>
    <rect x="330" y="250" width="80" height="200" rx="6" fill="#14283F"/>
    <!-- ventanas -->
    <g fill="#C4BEBD" opacity="0.65">
      <rect x="410" y="172" width="16" height="20"/><rect x="436" y="172" width="16" height="20"/><rect x="462" y="172" width="16" height="20"/>
      <rect x="410" y="206" width="16" height="20"/><rect x="436" y="206" width="16" height="20"/><rect x="462" y="206" width="16" height="20"/>
      <rect x="410" y="240" width="16" height="20"/><rect x="436" y="240" width="16" height="20"/><rect x="462" y="240" width="16" height="20"/>
      <rect x="410" y="274" width="16" height="20"/><rect x="436" y="274" width="16" height="20"/><rect x="462" y="274" width="16" height="20"/>
      <rect x="410" y="308" width="16" height="20"/><rect x="436" y="308" width="16" height="20"/><rect x="462" y="308" width="16" height="20"/>
    </g>
    <g fill="#E4CE9A" opacity="0.85">
      <rect x="490" y="234" width="14" height="18"/><rect x="514" y="234" width="14" height="18"/><rect x="538" y="234" width="14" height="18"/>
      <rect x="490" y="268" width="14" height="18"/><rect x="514" y="268" width="14" height="18"/><rect x="538" y="268" width="14" height="18"/>
      <rect x="490" y="302" width="14" height="18"/><rect x="514" y="302" width="14" height="18"/><rect x="538" y="302" width="14" height="18"/>
    </g>
    <g fill="#C4BEBD" opacity="0.5">
      <rect x="348" y="272" width="14" height="18"/><rect x="376" y="272" width="14" height="18"/>
      <rect x="348" y="304" width="14" height="18"/><rect x="376" y="304" width="14" height="18"/>
      <rect x="348" y="336" width="14" height="18"/><rect x="376" y="336" width="14" height="18"/>
    </g>
  </g>

  <!-- Escudo con balanza (confianza / protección) -->
  <g>
    <path d="M170 158 L262 158 Q272 158 272 172 L272 300 Q272 356 216 386 Q160 356 160 300 L160 172 Q160 158 170 158 Z" fill="url(#f-shield)"/>
    <path d="M170 158 L262 158 Q272 158 272 172 L272 300 Q272 356 216 386 Q160 356 160 300 L160 172 Q160 158 170 158 Z" fill="none" stroke="#E4CE9A" stroke-width="3" opacity="0.9"/>
    <!-- balanza -->
    <g stroke="#E4CE9A" stroke-width="4" stroke-linecap="round" fill="none">
      <line x1="216" y1="212" x2="216" y2="300"/>
      <line x1="180" y1="228" x2="252" y2="228"/>
      <circle cx="216" cy="212" r="5" fill="#E4CE9A" stroke="none"/>
      <path d="M180 228 L166 258 H194 Z" fill="#EBD9A7" stroke="none" opacity="0.95"/>
      <path d="M252 228 L238 258 H266 Z" fill="#EBD9A7" stroke="none" opacity="0.95"/>
      <line x1="192" y1="308" x2="240" y2="308"/>
    </g>
  </g>

  <!-- Suelo -->
  <rect x="0" y="446" width="640" height="6" fill="#14283F"/>
</svg>
