<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 420" role="img" aria-label="Derecho laboral empresarial">
  <defs>
    <linearGradient id="l-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EBD9A7"/>
      <stop offset="1" stop-color="#D9BE7E"/>
    </linearGradient>
  </defs>

  <circle cx="280" cy="200" r="168" fill="url(#l-gold)" opacity="0.16"/>

  <!-- Documento / contrato -->
  <g>
    <rect x="150" y="70" width="260" height="300" rx="14" fill="#F4F1EC"/>
    <rect x="150" y="70" width="260" height="300" rx="14" fill="none" stroke="#D8D2CB" stroke-width="2"/>
    <rect x="150" y="70" width="260" height="46" rx="14" fill="#1E3A5F"/>
    <rect x="150" y="102" width="260" height="14" fill="#1E3A5F"/>
    <circle cx="176" cy="93" r="6" fill="#E4CE9A"/>
    <rect x="196" y="88" width="120" height="10" rx="5" fill="#C4BEBD"/>
    <!-- líneas de texto -->
    <g fill="#C9C3BC">
      <rect x="178" y="146" width="204" height="9" rx="4"/>
      <rect x="178" y="168" width="204" height="9" rx="4"/>
      <rect x="178" y="190" width="150" height="9" rx="4"/>
      <rect x="178" y="226" width="204" height="9" rx="4"/>
      <rect x="178" y="248" width="180" height="9" rx="4"/>
    </g>
    <!-- Sello de aprobado -->
    <circle cx="330" cy="300" r="46" fill="none" stroke="#2C4A70" stroke-width="6" opacity="0.9"/>
    <path d="M310 300 l13 14 l24 -30" fill="none" stroke="#2C4A70" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Apretón de manos (acuerdo) -->
  <g transform="translate(150,300)">
    <path d="M-40 20 q40 -50 90 -10 q40 -30 74 6 l-20 28 q-30 -20 -54 2 q-40 30 -78 -4 Z" fill="#1E3A5F"/>
    <path d="M-6 22 l40 -6 l6 22 l-40 8 Z" fill="#E4CE9A"/>
  </g>

  <rect x="20" y="392" width="520" height="6" rx="3" fill="#14283F"/>
</svg>
