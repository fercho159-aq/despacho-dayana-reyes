<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 480" role="img" aria-label="Despacho jurídico corporativo">
  <defs>
    <linearGradient id="d-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2C4A70"/>
      <stop offset="1" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="d-gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#EBD9A7"/>
      <stop offset="1" stop-color="#D9BE7E"/>
    </linearGradient>
  </defs>

  <!-- Acento dorado -->
  <circle cx="500" cy="120" r="96" fill="url(#d-gold)" opacity="0.35"/>
  <circle cx="500" cy="120" r="60" fill="url(#d-gold)" opacity="0.5"/>

  <!-- Skyline de fondo -->
  <g fill="#C4BEBD" opacity="0.45">
    <rect x="24" y="250" width="70" height="182" rx="3"/>
    <rect x="104" y="205" width="52" height="227" rx="3"/>
    <rect x="492" y="228" width="60" height="204" rx="3"/>
    <rect x="560" y="272" width="56" height="160" rx="3"/>
  </g>
  <g fill="#A6A09F" opacity="0.35">
    <rect x="44" y="278" width="10" height="14"/><rect x="64" y="278" width="10" height="14"/>
    <rect x="44" y="306" width="10" height="14"/><rect x="64" y="306" width="10" height="14"/>
    <rect x="120" y="230" width="9" height="13"/><rect x="136" y="230" width="9" height="13"/>
    <rect x="120" y="258" width="9" height="13"/><rect x="136" y="258" width="9" height="13"/>
    <rect x="510" y="252" width="10" height="14"/><rect x="528" y="252" width="10" height="14"/>
    <rect x="510" y="282" width="10" height="14"/><rect x="528" y="282" width="10" height="14"/>
  </g>

  <!-- Edificio principal (pórtico clásico) -->
  <g>
    <!-- Escalinata -->
    <rect x="150" y="404" width="340" height="16" rx="3" fill="#14283F"/>
    <rect x="168" y="388" width="304" height="16" rx="2" fill="#1E3A5F"/>
    <!-- Basamento de columnas -->
    <rect x="182" y="374" width="276" height="14" fill="#2C4A70"/>
    <!-- Columnas -->
    <g fill="#F4F1EC">
      <rect x="196" y="262" width="24" height="112" rx="2"/>
      <rect x="246" y="262" width="24" height="112" rx="2"/>
      <rect x="296" y="262" width="24" height="112" rx="2"/>
      <rect x="346" y="262" width="24" height="112" rx="2"/>
      <rect x="396" y="262" width="24" height="112" rx="2"/>
    </g>
    <g fill="#D8D2CB">
      <rect x="196" y="262" width="6" height="112"/>
      <rect x="246" y="262" width="6" height="112"/>
      <rect x="296" y="262" width="6" height="112"/>
      <rect x="346" y="262" width="6" height="112"/>
      <rect x="396" y="262" width="6" height="112"/>
    </g>
    <!-- Entablamento -->
    <rect x="176" y="244" width="288" height="20" rx="2" fill="#F4F1EC"/>
    <!-- Frontón -->
    <polygon points="320,178 470,244 170,244" fill="#1E3A5F"/>
    <polygon points="320,192 448,244 192,244" fill="#2C4A70"/>
    <!-- Emblema de balanza en el frontón -->
    <g stroke="#E4CE9A" stroke-width="3" stroke-linecap="round" fill="none">
      <line x1="320" y1="214" x2="320" y2="238"/>
      <line x1="298" y1="220" x2="342" y2="220"/>
      <path d="M298 220 L291 233 H305 Z" fill="#E4CE9A" stroke="none"/>
      <path d="M342 220 L335 233 H349 Z" fill="#E4CE9A" stroke="none"/>
      <circle cx="320" cy="214" r="3" fill="#E4CE9A" stroke="none"/>
    </g>
  </g>

  <!-- Suelo -->
  <rect x="0" y="420" width="640" height="6" fill="#14283F"/>
</svg>
